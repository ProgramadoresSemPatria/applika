log_format clean '$time_iso8601 | $status | ${request_time}s | $request_method $request_uri | $remote_addr';

map $sent_http_content_type $loggable {
    default 0;
    "text/html" 1;
}

server {
    listen 80;
    server_name _;

    access_log /dev/stdout clean buffer=32k flush=5s if=$loggable;
    error_log  /dev/stderr error;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /_next/static/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}